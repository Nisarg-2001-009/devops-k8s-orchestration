# secret.yaml — Stores sensitive configuration separately from plain config.
#
# WHY SECRET INSTEAD OF CONFIGMAP?
# Kubernetes Secrets are:
#   - Base64-encoded in the API (not plaintext like ConfigMaps).
#   - Eligible for encryption-at-rest via a KMS provider (configured at the
#     cluster level — a best practice for production).
#   - Separately RBAC-gated: you can allow a service account to read ConfigMaps
#     but not Secrets, limiting blast radius if credentials are rotated.
#   - Excluded from `kubectl get all` output by default.
#
# IMPORTANT — THIS FILE SHOULD NOT BE COMMITTED WITH REAL SECRETS.
# The value below ("dev-secret-key-12345") is a placeholder for local/dev use.
# In production, use an external secret manager (AWS Secrets Manager,
# HashiCorp Vault, Sealed Secrets, External Secrets Operator) to inject the
# real value at deploy time so it never lives in source control.

apiVersion: v1
kind: Secret

metadata:
  name: app-secret          # Referenced by name in the Deployment's envFrom block.
  namespace: microservices

# type: Opaque is the generic catch-all Secret type for arbitrary key-value
# data.  Other types (kubernetes.io/tls, kubernetes.io/dockerconfigjson) have
# special handling by the API server.
type: Opaque

# stringData accepts plain UTF-8 strings — Kubernetes base64-encodes them
# automatically before storing in etcd.  This is more readable in source
# control than the `data` field which requires you to pre-encode values
# yourself with `echo -n "value" | base64`.
stringData:
  # Placeholder API key consumed by the services via os.getenv("API_KEY").
  # Replace with a real secret injected by your CI/CD pipeline or secret manager.
  API_KEY: "dev-secret-key-12345"
